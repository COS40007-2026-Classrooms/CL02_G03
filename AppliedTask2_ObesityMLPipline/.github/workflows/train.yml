# train.yml from Studio 7 pdf

name: Train ML Model

on:
  push:
    branches: [ main ]         # runs every time you push to main
  pull_request:
    branches: [ main ]         # runs on pull requests to main
  workflow_dispatch:           # allows manual trigger from GitHub UI

jobs:
  train:
    runs-on: ubuntu-latest     # GitHub-hosted Linux runner (free)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: python model.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: model-results
          path: |
            model_results.png
            metrics.txt
